<style>
:root{--bg:#0a0a0f;--card:#1a1a24;--inset:#12121a;--text:#e8e8ed;--sub:#9898a8;--border:#2a2a3a;--gold:#ffa502;--bull:#2ed573;--bear:#ff4757;--info:#70a1ff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;line-height:1.55;padding:22px 14px 92px}
.wrap{max-width:760px;margin:0 auto}
.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
h1{font-size:24px;line-height:1.15;margin-bottom:5px}
h2{font-size:21px;line-height:1.2;margin-bottom:6px}
h3{font-size:16px;margin-bottom:6px}
.sub,.hint{color:var(--sub);font-size:13px;line-height:1.5}
.hint.good{color:var(--bull)}.hint.bad{color:var(--bear)}
.clock{font-family:'JetBrains Mono',monospace;color:var(--gold);font-weight:700;white-space:nowrap}.clock span{font-size:11px;color:var(--sub)}
.card,.panel,.metric,.saved-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:17px;margin-bottom:14px}
.screen{min-height:calc(100vh - 190px);display:flex;flex-direction:column;justify-content:center}
.hero-actions,.row-actions,.bottom-nav{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
.btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.06em;border:1px solid var(--border);border-radius:9px;background:var(--inset);color:var(--sub);padding:12px 14px;cursor:pointer;min-height:44px}
.btn.primary{border-color:var(--gold);color:var(--gold);background:rgba(255,165,2,.08)}
.btn.good{border-color:rgba(46,213,115,.55);color:var(--bull);background:rgba(46,213,115,.08)}
.btn.danger:hover{border-color:var(--bear);color:var(--bear)}
.btn:disabled{opacity:.42;cursor:not-allowed}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.btn-row-between{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.metric{padding:13px;background:var(--inset)}.metric .m{font-family:'JetBrains Mono',monospace;font-size:21px;color:var(--gold);font-weight:700}.metric .l{font-size:12px;color:var(--sub)}
.label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);display:block;margin:10px 0 5px}
.in{width:100%;background:var(--inset);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;padding:12px}
.in::placeholder{color:#5a5a6e}textarea.in{min-height:96px;resize:vertical;line-height:1.45}
.progress{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.pill{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--border);border-radius:999px;color:var(--sub);padding:4px 9px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.pill.ok{color:var(--bull);border-color:rgba(46,213,115,.45)}.pill.warn{color:var(--gold);border-color:rgba(255,165,2,.45)}.pill.bad{color:var(--bear);border-color:rgba(255,71,87,.45)}.pill.info{color:var(--info);border-color:rgba(112,161,255,.45)}
.focus-output{background:var(--inset);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px}
.line{display:grid;grid-template-columns:124px 1fr;gap:10px;border-bottom:1px solid var(--border);padding:7px 0}.line:last-child{border-bottom:0}.k{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--sub)}.v{overflow-wrap:anywhere}.empty{color:#5a5a6e;font-style:italic}.bull{color:var(--bull);font-weight:700}.bear{color:var(--bear);font-weight:700}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(10,10,15,.92);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:10px max(14px,env(safe-area-inset-left)) max(10px,env(safe-area-inset-bottom));justify-content:center}.bottom-nav .inner{max-width:760px;width:100%;display:flex;gap:10px;justify-content:space-between}.bottom-nav .btn{flex:1}
.saved-row{cursor:pointer;transition:border-color .15s}.saved-row:hover{border-color:rgba(255,165,2,.45)}.saved-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}.saved-title{font-weight:700}.saved-title small{display:block;color:var(--sub);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;margin-top:2px}
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.check-row{display:flex;gap:9px;align-items:flex-start;background:var(--inset);border:1px solid var(--border);border-radius:9px;padding:10px;font-size:13px}.check-row input{margin-top:3px}
.save-state{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub);margin-top:9px}.save-state.good{color:var(--bull)}.save-state.warn{color:var(--gold)}.save-state.bad{color:var(--bear)}
.learn-list{display:grid;gap:10px;margin-top:12px}.learn{background:var(--inset);border:1px solid var(--border);border-radius:10px;padding:13px}.learn p{color:var(--sub);font-size:13px}
.file-input{display:none}.footer{font-family:'JetBrains Mono',monospace;font-size:11px;color:#5a5a6e;margin-top:20px;text-align:center}
@media(max-width:720px){body{padding:18px 10px 92px}.top{display:block}.clock{margin-top:8px}.screen{min-height:calc(100vh - 180px);justify-content:flex-start}.grid,.metric-grid,.review-grid{grid-template-columns:1fr}.line{grid-template-columns:1fr;gap:2px}.hero-actions .btn,.row-actions .btn{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">ICT Focus Tool</div>
      <h1>Draw on Liquidity · LTF Sweep</h1>
      <p class="sub">A page-by-page workflow for one instrument, up to three draws, and one lower-timeframe sweep.</p>
    </div>
    <div class="clock" id="nyClock">--:--:-- <span>NY</span></div>
  </div>
  <main id="app"></main>
  <div class="footer">ICT DOL Sweep Tracker v0.6.0 · Educational planning tool only. Not financial advice.</div>
</div>
<script>
(function(){
var STORE_KEY='ict_dol_sweep_cards_v3',OLD_KEY='ict_dol_sweep_cards_v2',MAX_CARDS=50,CARD_SCHEMA='ict_dol_sweep_card_v6',EXPORT_SCHEMA='ict_dol_sweep_export_v6';
var instruments=['MNQ','NQ','MES','ES','MYM','YM','MGC','GC','CL','EURUSD','GBPUSD','BTCUSD'];
var hitTimes=['London Killzone','Pre NY','NY AM','NY Lunch','London Close','During Macro','Outside Killzone','Today','Tomorrow','This week','Other / discretionary'];
var confidence=['Low','Medium','High'];
var sweepPools=['Previous day high (PDH)','Previous day low (PDL)','Previous week high (PWH)','Previous week low (PWL)','Session high','Session low','Relative equal highs (REH)','Relative equal lows (REL)','Old high / prior swing high','Old low / prior swing low','New Week Opening Gap (NWOG)','New Day Opening Gap (NDOG)','HTF fair value gap','Fair value gap'];
var fieldIds=['tradeDate','instrument','session','draw1Level','draw1Rationale','draw1Confidence','draw1HitTime','draw2Level','draw2Rationale','draw2Confidence','draw2HitTime','draw3Level','draw3Rationale','draw3Confidence','draw3HitTime','sweepTime','sweepTf','sweepPool','sweepLevel','fvgConfirmed','fvgTf'];
var state={view:'home',step:0,reviewId:null,fields:blankFields(),staged:null,message:''},app=document.getElementById('app');
function blankFields(){var f={};fieldIds.forEach(function(id){f[id]='';});return f;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function val(id){var n=document.getElementById(id);return n?(n.type==='checkbox'?(n.checked?'yes':''):String(n.value||'').trim()):'';}
function setView(v){state.view=v;state.message='';render();}
function setStep(s){state.step=Math.max(0,Math.min(3,s));state.view='wizard';state.message='';render();}
function updateStateFromInputs(){fieldIds.forEach(function(id){var n=document.getElementById(id);if(n)state.fields[id]=(n.type==='checkbox'?(n.checked?'yes':''):String(n.value||'').trim());});}
function cleanNumberValue(v){var r=String(v||'').trim();if(/^n\/?a$/i.test(r))return'N/A';return r.replace(/,/g,'.').replace(/[^0-9.]/g,'').replace(/(\..*)\./g,'$1');}
function simpleOptions(opts,sel,ph){var h='<option value="">'+esc(ph||'— select —')+'</option>';opts.forEach(function(o){h+='<option value="'+esc(o)+'" '+(sel===o?'selected':'')+'>'+esc(o)+'</option>';});return h;}
function instrumentOptions(sel){var opts=instruments.slice();if(sel&&opts.indexOf(sel)<0)opts.push(sel);return simpleOptions(opts,sel,'— select instrument —');}
function selectBlock(id,label,html){return'<label class="label" for="'+id+'">'+esc(label)+'</label><select class="in" id="'+id+'">'+html+'</select>';}
function inputBlock(id,label,type,ph){return'<label class="label" for="'+id+'">'+esc(label)+'</label><input class="in '+(/Level$/.test(id)?'numeric':'')+'" id="'+id+'" type="'+(type||'text')+'" value="'+esc(state.fields[id]||'')+'" placeholder="'+esc(ph||'')+'">';}
function checkboxBlock(id,label,hint){return'<label class="check-row"><input type="checkbox" id="'+id+'" '+(state.fields[id]==='yes'?'checked':'')+'> <span>'+esc(label)+(hint?'<br><small>'+esc(hint)+'</small>':'')+'</span></label>';}
function line(k,v,cls){return'<div class="line"><div class="k">'+esc(k)+'</div><div class="v '+(cls||'')+'">'+(v?esc(v):'<span class="empty">—</span>')+'</div></div>';}
function metric(v,l){return'<div class="metric"><div class="m">'+esc(v)+'</div><div class="l">'+esc(l)+'</div></div>';}
function drawRow(f,n){return{level:f['draw'+n+'Level']||'',rationale:f['draw'+n+'Rationale']||'',confidence:f['draw'+n+'Confidence']||'',hitTime:f['draw'+n+'HitTime']||''};}
function drawRows(f){return[1,2,3].map(function(n){var r=drawRow(f,n);r.n=n;r.any=!!(r.level||r.rationale||r.confidence||r.hitTime);r.complete=!!(r.level&&r.rationale&&r.confidence&&r.hitTime);return r;});}
function drawValidation(f){var rows=drawRows(f||state.fields),started=rows.filter(function(r){return r.any;}),complete=rows.filter(function(r){return r.complete;}),partial=started.filter(function(r){return !r.complete;});return{valid:complete.length>0&&partial.length===0,started:started.length,complete:complete.length,partial:partial.length};}
function drawText(f){var rows=drawRows(f||state.fields).filter(function(r){return r.any;});if(!rows.length)return'';return rows.map(function(r){var bits=[r.level?'Level '+r.level:'',r.rationale?'Rationale: '+r.rationale:'',r.confidence?'Confidence: '+r.confidence:'',r.hitTime?'Hit time: '+r.hitTime:''].filter(Boolean);return'DOL '+r.n+' — '+bits.join(' · ');}).join('  ');}
function inferSideFromDraws(f){var txt=drawRows(f||state.fields).filter(function(r){return r.complete;}).map(function(r){return r.rationale;}).join(' ').toLowerCase();var bull=/\b(high|pdh|pwh|reh|buy-side|buyside|buy side)\b/.test(txt),bear=/\b(low|pdl|pwl|rel|sell-side|sellside|sell side)\b/.test(txt);if(bull&&!bear)return'bull';if(bear&&!bull)return'bear';return'';}
function sideText(s){return s==='bull'?'Bullish draw / buy-side target':s==='bear'?'Bearish draw / sell-side target':'Draft / mixed draw stack';}
function fvgText(f){return f.fvgConfirmed==='yes'?('FVG confirmed'+(f.fvgTf?' · '+f.fvgTf:'')):'Not confirmed';}
function statusFromFields(f){f=f||{};var m=[],dv=drawValidation(f);if(!(f.instrument||'').trim())m.push('instrument');if(!dv.valid)m.push(dv.partial?'complete started DOL rows':'at least one DOL');if(!(f.sweepTime||'').trim())m.push('potential sweep time');var ready=!m.length;return{ready:ready,missing:m,drawSide:inferSideFromDraws(f),status:ready?'complete':'draft',drawCount:dv.complete};}
function focusSummary(f){var st=statusFromFields(f),cls=st.drawSide==='bull'?'bull':st.drawSide==='bear'?'bear':'';return line('Instrument',f.instrument)+line('DOL stack',drawText(f),cls)+line('Bias read',sideText(st.drawSide),cls)+line('Sweep',[f.sweepTime,f.sweepTf,f.sweepPool,f.sweepLevel].filter(Boolean).join(' · '))+line('FVG',fvgText(f))+line('Focus status',st.ready?'READY — '+st.drawCount+' DOL recorded':'DRAFT — '+(st.missing.join(', ')||'review logic'));}
function homeHTML(){var cards=load(),a=analytics(cards);return'<section class="screen"><div class="card"><div class="progress">Main page</div><h2>Start with one clean analysis</h2><p class="sub">Work through one input page at a time. Step 2 now supports up to three draw-on-liquidity ideas.</p><div class="metric-grid">'+metric(cards.length,'Saved cards')+metric(a.rate+'%','Final hit rate')+metric(a.closed,'Final Hit/Miss')+metric(a.unfinalised,'Needs final save')+'</div><div class="hero-actions"><button class="btn primary" id="startBtn">Start new analysis</button><button class="btn" id="savedBtn">Saved cards</button><button class="btn" id="learnBtn">Liquidity notes</button></div></div></section>';}
function drawCardHTML(n){return'<div class="panel"><div class="progress">DOL '+n+' of 3</div><div class="grid"><div>'+inputBlock('draw'+n+'Level','Draw on liquidity price level','text','price level')+'</div><div>'+inputBlock('draw'+n+'Rationale','Draw rationale','text','e.g. PDH / PDL / Asia high')+'</div></div><div class="grid"><div>'+selectBlock('draw'+n+'Confidence','Draw confidence',simpleOptions(confidence,state.fields['draw'+n+'Confidence'],'— confidence —'))+'</div><div>'+selectBlock('draw'+n+'HitTime','Hit time',simpleOptions(hitTimes,state.fields['draw'+n+'HitTime'],'— expected hit time —'))+'</div></div></div>';}
function wizardHTML(){var title=['Instrument','Draws on Liquidity','Potential Sweep','Review Focus Card'][state.step],body='',st=statusFromFields(state.fields),dv=drawValidation(state.fields);if(state.step===0){body='<h2>Choose the instrument</h2><p class="sub">Select one instrument from the dropdown. This keeps the draw and sweep clean.</p><div class="grid"><div>'+inputBlock('tradeDate','Date','date')+'</div><div>'+selectBlock('instrument','Instrument',instrumentOptions(state.fields.instrument))+'</div></div>'+selectBlock('session','Session (optional)',simpleOptions(['London','Pre-New York','New York AM','New York PM','Other'],state.fields.session,'Optional'));}else if(state.step===1){body='<h2>Define up to three draws on liquidity</h2><p class="sub">Enter one to three possible liquidity draws. Each started DOL must have price level, rationale, confidence and expected hit time.</p>'+drawCardHTML(1)+drawCardHTML(2)+drawCardHTML(3)+'<div class="focus-output">'+line('Completed DOLs',String(dv.complete)+' / 3')+line('Bias read',sideText(st.drawSide),st.drawSide==='bull'?'bull':st.drawSide==='bear'?'bear':'')+'</div>'+(dv.partial?'<p class="hint bad">One or more DOL rows has been started but not completed.</p>':'<p class="hint good">You can proceed once at least one DOL row is complete.</p>');}else if(state.step===2){body='<h2>Map the potential sweep time</h2><p class="sub">Use a controlled sweep time. No sweep note is required.</p>'+selectBlock('sweepTime','Sweep time (potential)',simpleOptions(hitTimes,state.fields.sweepTime,'— select potential sweep time —'))+'<div class="grid"><div>'+selectBlock('sweepTf','LTF sweep timeframe',simpleOptions(['15m','5m','3m','1m'],state.fields.sweepTf,'— timeframe —'))+'</div><div>'+selectBlock('sweepPool','Liquidity swept',simpleOptions(sweepPools,state.fields.sweepPool,'— liquidity swept —'))+'</div></div>'+inputBlock('sweepLevel','Sweep level','text','price level swept')+'<div class="panel">'+checkboxBlock('fvgConfirmed','FVG in the direction of the sweep','Optional confirmation only. Do not let this overcomplicate the analysis.')+selectBlock('fvgTf','FVG timeframe',simpleOptions(['15m','5m','3m','1m'],state.fields.fvgTf,'— select FVG timeframe —'))+'</div>';}else{body='<h2>Review before saving</h2><p class="sub">Missing fields are shown as Draft, but Save card still works.</p><div class="focus-output">'+focusSummary(state.fields)+'</div><div class="row-actions"><button class="btn primary" id="saveWizardBtn">Save card</button></div>';}return'<section class="screen"><div class="card"><div class="progress">Step '+(state.step+1)+' of 4 — '+esc(title)+'</div>'+body+'</div></section>'+bottomNavHTML();}
function bottomNavHTML(){return'<div class="bottom-nav"><div class="inner"><button class="btn" id="backBtn">Back</button><button class="btn primary" id="nextBtn">'+(state.step===3?'Save card':'Next')+'</button></div></div>';}
function savedListHTML(){var cards=load(),a=analytics(cards),list='';if(!cards.length){list='<div class="panel"><p class="hint">No saved cards yet. Start a new analysis from the main page.</p></div>';}else{cards.forEach(function(c){var f=c.fields,pill=c.review.verified?'<span class="pill ok">Final saved</span>':(c.outcome==='open'?'<span class="pill warn">Open</span>':'<span class="pill warn">Needs final save</span>');list+='<div class="saved-row" data-card-id="'+esc(c.id)+'"><div class="saved-head"><div class="saved-title">'+esc(f.instrument||'No instrument')+'<small>'+esc((f.tradeDate||'no date')+' · '+(f.session||'no session')+' · '+formatDate(c.firstSavedAt||c.createdAt))+'</small></div>'+pill+'</div><div class="focus-output">'+line('DOL stack',drawText(f),c.drawSide==='bull'?'bull':c.drawSide==='bear'?'bear':'')+line('Sweep',[f.sweepTime,f.sweepTf,f.sweepPool,f.sweepLevel].filter(Boolean).join(' · '))+line('FVG',fvgText(f))+line('Outcome',c.outcome)+'</div></div>';});}return'<section><div class="btn-row-between"><div><div class="progress">Saved cards</div><h2>Review saved analyses</h2></div><button class="btn" id="homeBtn">Main page</button></div><div class="metric-grid">'+metric(a.rate+'%','Final hit rate')+metric(a.closed,'Final Hit/Miss')+metric(a.be,'Final BE')+metric(a.unfinalised,'Needs final save')+'</div><div class="row-actions"><button class="btn" id="verifyDataBtn">Verify data</button><button class="btn" id="exportTxtBtn">Export text</button><button class="btn" id="exportJsonBtn">Export JSON</button><button class="btn" id="importBtn">Import JSON</button><input class="file-input" id="importFile" type="file" accept="application/json"></div><p class="hint">Open a card to edit markers, outcome and notes. Use Final save to include it in accuracy.</p>'+list+'</section>';}
function checkHTML(key,label,checked){return'<label class="check-row"><input type="checkbox" data-check="'+key+'" '+(checked?'checked':'')+'> '+esc(label)+'</label>';}
function reviewCardHTML(){var card=getCardById(state.reviewId);if(!card)return'<section class="screen"><div class="card"><h2>Card not found</h2><button class="btn" id="cardsBtn">Back to saved cards</button></div></section>';if(!state.staged||state.staged.id!==card.id)state.staged=stageFromCard(card);var s=state.staged,f=card.fields,pill=card.review.verified?'<span class="pill ok">Final saved</span>':'<span class="pill warn">Not final</span>';return'<section><div class="btn-row-between"><div><div class="progress">Saved card review</div><h2>'+esc(f.instrument||'No instrument')+'</h2></div>'+pill+'</div><div class="focus-output">'+focusSummary(f)+line('First saved at',formatDate(card.firstSavedAt||card.createdAt))+line('Final saved at',card.finalSavedAt||'')+'</div><div class="card"><h3>Verification markers</h3><div class="review-grid">'+checkHTML('draw','Draw respected',s.review.draw)+checkHTML('sweep','LTF sweep confirmed',s.review.sweep)+checkHTML('followed','Plan followed',s.review.followed)+'</div><label class="label" for="reviewOutcome">Outcome</label><select class="in" id="reviewOutcome"><option value="open" '+(s.outcome==='open'?'selected':'')+'>Open</option><option value="hit" '+(s.outcome==='hit'?'selected':'')+'>Hit</option><option value="miss" '+(s.outcome==='miss'?'selected':'')+'>Miss</option><option value="be" '+(s.outcome==='be'?'selected':'')+'>Breakeven</option></select><label class="label" for="reviewNotes">Verification notes</label><textarea class="in" id="reviewNotes" placeholder="Notes for this analysis">'+esc(s.notes)+'</textarea><div class="save-state '+(state.message.indexOf('failed')>=0||state.message.indexOf('Select')>=0?'bad':state.message.indexOf('Unsaved')>=0?'warn':'good')+'">'+esc(state.message||'Saved locally')+'</div><div class="row-actions"><button class="btn" id="loadCardBtn">Load to planner</button><button class="btn" id="copyCardBtn">Copy</button><button class="btn primary" id="saveChangesBtn">Save changes</button><button class="btn primary" id="finalSaveBtn">Final save</button><button class="btn danger" id="deleteCardBtn">Delete</button></div></div><div class="bottom-nav"><div class="inner"><button class="btn" id="backToCardsBtn">Back to saved cards</button><button class="btn primary" id="finalSaveBottomBtn">Final save</button></div></div></section>';}
function learnHTML(){return'<section class="screen"><div class="card"><div class="progress">Liquidity notes</div><h2>Keep it simple</h2><div class="learn-list"><div class="learn"><h3>1. Instrument</h3><p>Choose one instrument from the dropdown only.</p></div><div class="learn"><h3>2. Draws</h3><p>Record up to three likely draw-on-liquidity levels with confidence and expected hit time.</p></div><div class="learn"><h3>3. Sweep</h3><p>Map when and where a lower-timeframe sweep could occur.</p></div><div class="learn"><h3>4. FVG</h3><p>Use FVG as optional confirmation only.</p></div></div><div class="row-actions"><button class="btn primary" id="learnBackBtn">Back</button></div></div></section>';}
function render(){if(state.view==='wizard')app.innerHTML=wizardHTML();else if(state.view==='saved')app.innerHTML=savedListHTML();else if(state.view==='review')app.innerHTML=reviewCardHTML();else if(state.view==='learn')app.innerHTML=learnHTML();else app.innerHTML=homeHTML();wire();}
function wire(){var b;if((b=document.getElementById('startBtn')))b.onclick=function(){state.fields=blankFields();state.step=0;setToday();setStep(0);};if((b=document.getElementById('savedBtn')))b.onclick=function(){setView('saved');};if((b=document.getElementById('learnBtn')))b.onclick=function(){setView('learn');};if((b=document.getElementById('learnBackBtn')))b.onclick=function(){setView('home');};if((b=document.getElementById('homeBtn')))b.onclick=function(){setView('home');};if((b=document.getElementById('backBtn')))b.onclick=function(){updateStateFromInputs();if(state.step===0)setView('home');else setStep(state.step-1);};if((b=document.getElementById('nextBtn')))b.onclick=function(){updateStateFromInputs();if(state.step===3)saveWizard();else setStep(state.step+1);};if((b=document.getElementById('saveWizardBtn')))b.onclick=function(){updateStateFromInputs();saveWizard();};Array.prototype.forEach.call(document.querySelectorAll('.numeric'),function(n){n.addEventListener('input',function(){n.value=cleanNumberValue(n.value);});});Array.prototype.forEach.call(document.querySelectorAll('.saved-row'),function(r){r.onclick=function(){state.reviewId=r.getAttribute('data-card-id');state.staged=null;setView('review');};});if((b=document.getElementById('cardsBtn')))b.onclick=function(){setView('saved');};if((b=document.getElementById('backToCardsBtn')))b.onclick=function(){state.staged=null;setView('saved');};if((b=document.getElementById('loadCardBtn')))b.onclick=function(){var c=getCardById(state.reviewId);if(c){state.fields=Object.assign(blankFields(),c.fields);state.step=0;state.staged=null;setStep(0);}};if((b=document.getElementById('copyCardBtn')))b.onclick=function(){var c=getCardById(state.reviewId);copyText(cardText(c));};if((b=document.getElementById('deleteCardBtn')))b.onclick=function(){deleteCard(state.reviewId);setView('saved');};if((b=document.getElementById('saveChangesBtn')))b.onclick=function(){saveReview(false);};if((b=document.getElementById('finalSaveBtn')))b.onclick=function(){saveReview(true);};if((b=document.getElementById('finalSaveBottomBtn')))b.onclick=function(){saveReview(true);};if((b=document.getElementById('exportTxtBtn')))b.onclick=function(){copyText(load().map(cardText).join('\n\n---\n\n'));};if((b=document.getElementById('exportJsonBtn')))b.onclick=exportJson;if((b=document.getElementById('importBtn')))b.onclick=function(){document.getElementById('importFile').click();};if((b=document.getElementById('importFile')))b.onchange=importJson;if((b=document.getElementById('verifyDataBtn')))b.onclick=function(){alert('Saved cards: '+load().length+'\nStorage key: '+STORE_KEY+'\nSchema: '+CARD_SCHEMA);};var ro=document.getElementById('reviewOutcome'),rn=document.getElementById('reviewNotes');if(ro)ro.onchange=markStagedDirty;if(rn)rn.oninput=markStagedDirty;Array.prototype.forEach.call(document.querySelectorAll('[data-check]'),function(ch){ch.onchange=markStagedDirty;});}
function setToday(){if(!state.fields.tradeDate){try{state.fields.tradeDate=new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});}catch(e){state.fields.tradeDate=new Date().toISOString().slice(0,10);}}}
function saveWizard(){var cards=load(),now=new Date().toISOString(),card={schema:CARD_SCHEMA,id:'card_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7),createdAt:now,firstSavedAt:now,updatedAt:now,finalSavedAt:'',fields:Object.assign(blankFields(),state.fields),drawSide:statusFromFields(state.fields).drawSide,status:statusFromFields(state.fields).status,outcome:'open',notes:'',review:{draw:false,sweep:false,followed:false,verified:false}};cards.unshift(card);store(cards);state.reviewId=card.id;state.staged=null;setView('review');}
function stageFromCard(c){return{id:c.id,outcome:c.outcome||'open',notes:c.notes||'',review:{draw:!!(c.review&&c.review.draw),sweep:!!(c.review&&c.review.sweep),followed:!!(c.review&&c.review.followed)}};}
function readStageFromDom(){var s=state.staged||stageFromCard(getCardById(state.reviewId));var ro=document.getElementById('reviewOutcome'),rn=document.getElementById('reviewNotes');if(ro)s.outcome=ro.value;if(rn)s.notes=rn.value;Array.prototype.forEach.call(document.querySelectorAll('[data-check]'),function(ch){s.review[ch.getAttribute('data-check')]=ch.checked;});return s;}
function markStagedDirty(){state.staged=readStageFromDom();state.message='Unsaved review changes';var msg=document.querySelector('.save-state');if(msg){msg.className='save-state warn';msg.textContent=state.message;}}
function saveReview(finalise){var cards=load(),idx=cards.findIndex(function(c){return c.id===state.reviewId;});if(idx<0)return;var s=readStageFromDom();if(finalise&&s.outcome==='open'){state.message='Select Hit, Miss or Breakeven before final save';render();return;}var c=cards[idx];c.outcome=s.outcome;c.notes=s.notes;c.review.draw=!!s.review.draw;c.review.sweep=!!s.review.sweep;c.review.followed=!!s.review.followed;c.updatedAt=new Date().toISOString();if(finalise){c.review.verified=true;c.finalSavedAt=new Date().toISOString();}cards[idx]=c;store(cards);state.staged=stageFromCard(c);state.message=finalise?'Final save complete':'Changes saved';render();}
function normaliseCard(c){if(!c||typeof c!=='object')return null;var f=Object.assign(blankFields(),c.fields||{});if(!f.draw1Level&&f.drawLevel)f.draw1Level=f.drawLevel;if(!f.draw1Rationale)f.draw1Rationale=f.drawPool||f.drawNote||'';if(!f.draw1Confidence)f.draw1Confidence='Medium';if(!f.draw1HitTime)f.draw1HitTime=f.sweepTime||'';delete f.drawNote;delete f.sweepNote;var now=new Date().toISOString(),st=statusFromFields(f);return{schema:CARD_SCHEMA,id:c.id||('card_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7)),createdAt:c.createdAt||now,firstSavedAt:c.firstSavedAt||c.createdAt||now,updatedAt:c.updatedAt||c.createdAt||now,finalSavedAt:c.finalSavedAt||'',fields:f,drawSide:st.drawSide,status:st.status,outcome:c.outcome||'open',notes:c.notes||'',review:{draw:!!(c.review&&c.review.draw),sweep:!!(c.review&&c.review.sweep),followed:!!(c.review&&c.review.followed),verified:!!(c.review&&c.review.verified)}};}
function load(){var raw=null;try{raw=JSON.parse(localStorage.getItem(STORE_KEY));if(!Array.isArray(raw)){raw=JSON.parse(localStorage.getItem(OLD_KEY));}}catch(e){raw=[];}if(!Array.isArray(raw))raw=[];return raw.map(normaliseCard).filter(Boolean).slice(0,MAX_CARDS);}
function store(cards){localStorage.setItem(STORE_KEY,JSON.stringify(cards.map(normaliseCard).filter(Boolean).slice(0,MAX_CARDS)));}
function getCardById(id){return load().filter(function(c){return c.id===id;})[0];}
function deleteCard(id){store(load().filter(function(c){return c.id!==id;}));}
function analytics(cards){var closed=cards.filter(function(c){return c.review&&c.review.verified&&['hit','miss'].indexOf(c.outcome)>=0;}),hits=closed.filter(function(c){return c.outcome==='hit';}).length,be=cards.filter(function(c){return c.review&&c.review.verified&&c.outcome==='be';}).length,unfinalised=cards.filter(function(c){return !(c.review&&c.review.verified);}).length;return{closed:closed.length,be:be,unfinalised:unfinalised,rate:closed.length?Math.round(hits/closed.length*100):0};}
function cardText(c){if(!c)return'';var f=c.fields;return['Instrument: '+(f.instrument||'—'),'Date: '+(f.tradeDate||'—')+' · Session: '+(f.session||'—'),'DOL stack: '+(drawText(f)||'—'),'Bias read: '+sideText(statusFromFields(f).drawSide),'Sweep: '+([f.sweepTime,f.sweepTf,f.sweepPool,f.sweepLevel].filter(Boolean).join(' · ')||'—'),'FVG: '+fvgText(f),'Outcome: '+(c.outcome||'open'),'First saved: '+formatDate(c.firstSavedAt||c.createdAt),'Final saved: '+(c.finalSavedAt||'—'),'Notes: '+(c.notes||'—')].join('\n');}
function copyText(txt){if(!txt)return;navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(txt):fallbackCopy(txt);}function fallbackCopy(txt){var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}
function exportJson(){var data={schema:EXPORT_SCHEMA,exportedAt:new Date().toISOString(),cards:load()};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='ict-dol-sweep-cards.json';a.click();URL.revokeObjectURL(url);}
function importJson(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(){try{var data=JSON.parse(r.result),cards=Array.isArray(data)?data:data.cards;if(!Array.isArray(cards))throw new Error('Invalid JSON');store(cards.concat(load()).slice(0,MAX_CARDS));setView('saved');}catch(err){alert('Import failed: '+err.message);}};r.readAsText(file);}
function formatDate(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('en-GB',{timeZone:'America/New_York',hour12:false})+' NY';}catch(e){return iso;}}
function tickClock(){var el=document.getElementById('nyClock');if(!el)return;try{var s=new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York',hour12:false});el.innerHTML=esc(s)+' <span>NY</span>'; }catch(e){el.innerHTML='--:--:-- <span>NY</span>';}}
setInterval(tickClock,1000);tickClock();setToday();render();
})();
</script>
